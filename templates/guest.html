<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skateland Rockford - Song Requests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #1e40af, #831843); /* Deep blue to hot pink */
            min-height: 100vh;
            color: white;
        }
        .logo-img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="max-w-2xl mx-auto p-6">

        <!-- Header with Logo -->
        <div class="flex flex-col items-center mb-10">
            <img src="/static/logo.png"
                 class="logo-img mb-6">
            <h1 class="text-5xl font-bold tracking-tighter text-white">SKATELAND</h1>
            <p class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-pink-400 -mt-3">ROCKFORD</p>
            <p class="text-pink-300 text-2xl mt-2">Song Requests & Voting</p>
        </div>

        <!-- Request Form -->
        <div class="bg-white/10 backdrop-blur-2xl rounded-3xl p-8 mb-10 border border-white/30">
            <h2 class="text-3xl font-semibold mb-8 text-center">Request a Song</h2>
            
            <form id="requestForm" action="/request" method="post" class="space-y-6">
                <input type="text" 
                       name="title" 
                       placeholder="Song Title" 
                       required 
                       class="w-full bg-white/10 border border-white/40 rounded-2xl px-6 py-5 text-lg placeholder:text-white/70 focus:outline-none focus:border-pink-400">

                <input type="text" 
                       name="artist" 
                       placeholder="Artist / Band" 
                       required 
                       class="w-full bg-white/10 border border-white/40 rounded-2xl px-6 py-5 text-lg placeholder:text-white/70 focus:outline-none focus:border-pink-400">

                <button type="submit" 
                        id="submitBtn"
                        class="w-full bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 font-bold text-xl py-5 rounded-2xl transition shadow-lg">
                    Submit Request
                </button>
            </form>
        </div>

        <!-- Current Requests -->
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <i class="fas fa-list text-pink-400"></i> Current Requests
        </h2>
        
        <div id="song-list" class="space-y-4">
            {% if songs %}
                {% for song in songs %}
                <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-6 flex justify-between items-center border border-white/20">
                    <div class="flex-1">
                        <div class="font-semibold text-xl">{{ song.title }}</div>
                        <div class="text-white/80">{{ song.artist }}</div>
                    </div>
                    <button onclick="vote({{ song.id }})" 
                            class="bg-white/10 hover:bg-white/25 px-8 py-4 rounded-2xl flex items-center gap-3 text-xl transition">
                        <i class="fas fa-arrow-up text-pink-400"></i>
                        <span class="font-bold">{{ song.votes }}</span>
                    </button>
                </div>
                {% endfor %}
            {% else %}
                <div class="bg-white/5 rounded-3xl p-20 text-center text-white/70">
                    No requests yet.<br>Be the first!
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        let isTyping = false;

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => { isTyping = true; });
            input.addEventListener('blur', () => { isTyping = false; });
        });

        setInterval(() => {
            if (!isTyping) location.reload();
        }, 8000);

        document.getElementById("requestForm").addEventListener("submit", function() {
            const btn = document.getElementById("submitBtn");
            btn.innerHTML = "Submitting...";
            btn.disabled = true;
        });

        async function vote(id) {
            await fetch(`/vote/${id}`, { method: "POST" });
            location.reload();
        }
    </script>
</body>
</html>
